<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="アレルギー管理">
<title>アレルギー対応チェック</title>
<style>
  :root {
    --bg: #f5f1ea; --bg-card: #ffffff; --bg-soft: #faf6ee;
    --ink: #1a1a1a; --ink-soft: #555; --ink-mute: #8a8478;
    --line: #e8e1d3; --line-strong: #c9bfa9;
    --accent: #8b2820;
    --warn: #d97706; --warn-bg: #fef3c7;
    --danger: #b91c1c; --danger-bg: #fee2e2;
    --ok: #15803d; --ok-bg: #dcfce7;
    --info: #1e40af; --info-bg: #dbeafe;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--ink);
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", serif;
    font-size: 16px; line-height: 1.6;
    overscroll-behavior-y: contain;
  }
  body { padding-bottom: env(safe-area-inset-bottom); min-height: 100vh; }
  .app { max-width: 720px; margin: 0 auto; padding: 0 16px 100px; }

header {
position: -webkit-sticky; position: sticky; top: 0; z-index: 50;
background: var(--bg); padding: 16px 16px 0;
border-bottom: 1px solid var(--line); margin: 0 -16px 16px;
}
.brand { display: flex; align-items: baseline; gap: 12px; margin-bottom: 4px; }
.brand-mark {
font-size: 11px; letter-spacing: 0.3em; color: var(--accent);
border: 1px solid var(--accent); padding: 3px 8px; border-radius: 2px;
}
.brand-title { font-size: 18px; font-weight: 600; letter-spacing: 0.05em; }
.date-line { font-size: 13px; color: var(--ink-mute); letter-spacing: 0.08em; padding-bottom: 8px; }

.tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--line); }
.tab {
flex: 1; padding: 10px 4px; text-align: center;
font-size: 14px; font-weight: 500; color: var(--ink-mute);
background: none; border: none; border-bottom: 2px solid transparent;
cursor: pointer; transition: all 0.2s; font-family: inherit;
}
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }

.filter-bar {
display: flex; gap: 6px; overflow-x: auto;
padding: 10px 0; -webkit-overflow-scrolling: touch;
}
.filter-bar::-webkit-scrollbar { display: none; }
.filter-pill {
padding: 6px 14px; background: white;
border: 1px solid var(--line-strong);
border-radius: 100px; font-size: 12px; font-family: inherit;
color: var(--ink-soft); cursor: pointer; white-space: nowrap;
flex-shrink: 0; transition: all 0.15s;
display: inline-flex; align-items: center; gap: 6px;
}
.filter-pill .pill-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--line-strong); }
.filter-pill.active { background: var(--ink); color: white; border-color: var(--ink); }
.filter-pill.active .pill-dot { background: white !important; }

.section-title {
font-size: 13px; font-weight: 600; letter-spacing: 0.15em;
color: var(--ink-soft); margin: 24px 0 12px;
padding-bottom: 6px; border-bottom: 1px solid var(--line);
display: flex; align-items: center; justify-content: space-between;
}
.section-title .count { font-size: 12px; color: var(--ink-mute); font-weight: 400; letter-spacing: 0.05em; }

.group-header {
display: flex; align-items: center; gap: 10px;
margin: 18px 0 8px; font-size: 13px; font-weight: 600;
letter-spacing: 0.1em; color: var(--ink-soft);
}
.group-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--line-strong); }

.card {
background: var(--bg-card); border: 1px solid var(--line);
border-radius: 4px; padding: 14px 16px; margin-bottom: 10px;
transition: all 0.15s;
}
.card-clickable { cursor: pointer; }
.card-clickable:active { transform: scale(0.99); background: var(--bg-soft); }

.tour-card { border-left: 4px solid var(--line-strong); }
.tour-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.tour-company { font-size: 11px; font-weight: 600; letter-spacing: 0.15em; color: var(--ink-soft); margin-bottom: 4px; }
.tour-name { font-size: 16px; font-weight: 600; line-height: 1.4; }
.tour-meta { font-size: 13px; color: var(--ink-mute); margin-top: 6px; }

.tour-progress { margin-top: 10px; height: 6px; background: var(--line); border-radius: 3px; overflow: hidden; }
.tour-progress-bar { height: 100%; background: var(--ok); transition: width 0.3s ease; }
.tour-progress-text { font-size: 12px; color: var(--ink-mute); margin-top: 4px; display: flex; justify-content: space-between; }

.badge {
display: inline-block; padding: 2px 8px; border-radius: 2px;
font-size: 11px; font-weight: 600; letter-spacing: 0.1em; white-space: nowrap;
}
.badge-warn { background: var(--warn-bg); color: var(--warn); }
.badge-danger { background: var(--danger-bg); color: var(--danger); }
.badge-ok { background: var(--ok-bg); color: var(--ok); }
.badge-info { background: var(--info-bg); color: var(--info); }

.btn {
display: inline-flex; align-items: center; justify-content: center; gap: 6px;
padding: 10px 18px; border: 1px solid var(--ink); background: var(--ink); color: var(--bg);
font-family: inherit; font-size: 14px; font-weight: 500; letter-spacing: 0.05em;
border-radius: 2px; cursor: pointer; transition: all 0.15s;
}
.btn:active { transform: scale(0.97); }
.btn-outline { background: transparent; color: var(--ink); }
.btn-accent { background: var(--accent); border-color: var(--accent); color: white; }
.btn-block { width: 100%; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

.btn-fab {
position: fixed; bottom: 20px; right: 20px;
width: 56px; height: 56px; border-radius: 50%;
background: var(--accent); color: white; border: none;
box-shadow: 0 6px 20px rgba(139, 40, 32, 0.35);
font-size: 28px; cursor: pointer; z-index: 40;
display: flex; align-items: center; justify-content: center;
}

.dish-grid { display: grid; gap: 8px; margin-top: 12px; }
.dish-row {
display: flex; align-items: center; gap: 12px;
padding: 14px; background: var(--bg-card);
border: 1px solid var(--line); border-radius: 4px;
cursor: pointer; transition: all 0.15s;
}
.dish-row.status-change { background: #fffbeb; border-color: #fde68a; }
.dish-row.status-warn { background: var(--danger-bg); border-color: #fecaca; }
.dish-row.status-served { background: var(--ok-bg); border-color: #86efac; opacity: 0.85; }

.dish-num { font-size: 11px; font-weight: 600; color: var(--ink-mute); letter-spacing: 0.1em; width: 32px; flex-shrink: 0; }
.dish-info { flex: 1; min-width: 0; }
.dish-name { font-size: 15px; font-weight: 500; margin-bottom: 2px; }
.dish-note { font-size: 12px; color: var(--ink-soft); }
.dish-change-note {
font-size: 12px; color: var(--accent); font-weight: 500;
margin-top: 4px; padding: 4px 8px; background: white;
border-radius: 3px; border-left: 3px solid var(--accent);
white-space: pre-wrap; word-break: break-all;
}
.dish-check {
width: 32px; height: 32px; border-radius: 50%;
border: 2px solid var(--line-strong); background: white;
display: flex; align-items: center; justify-content: center;
flex-shrink: 0; transition: all 0.2s;
}
.dish-row.status-served .dish-check { background: var(--ok); border-color: var(--ok); color: white; }

.course-edit-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--line); }
.course-edit-row:last-child { border-bottom: none; }
.course-edit-num { font-size: 11px; color: var(--ink-mute); width: 30px; letter-spacing: 0.1em; flex-shrink: 0; }
.course-edit-input {
flex: 1; padding: 6px 10px; border: 1px solid var(--line-strong);
border-radius: 3px; font-family: inherit; font-size: 14px; background: white;
}
.course-edit-remove {
width: 28px; height: 28px; border: 1px solid var(--line-strong);
background: white; color: var(--ink-mute); border-radius: 3px;
cursor: pointer; font-family: inherit; flex-shrink: 0;
}

.modal-backdrop {
position: fixed; top: 0; right: 0; bottom: 0; left: 0; background: rgba(0,0,0,0.5);
z-index: 100; display: none;
}
.modal-backdrop.show { display: -webkit-flex; display: flex; -webkit-align-items: flex-end; align-items: flex-end; -webkit-justify-content: center; justify-content: center; }
.modal {
background: var(--bg); width: 100%; max-width: 720px;
max-height: 92vh; border-radius: 12px 12px 0 0;
overflow-y: auto; animation: slideUp 0.25s ease;
padding-bottom: env(safe-area-inset-bottom);
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal-header {
position: -webkit-sticky; position: sticky; top: 0; background: var(--bg);
padding: 16px 16px 12px; border-bottom: 1px solid var(--line);
display: flex; justify-content: space-between; align-items: center; z-index: 10;
}
.modal-title { font-size: 17px; font-weight: 600; }
.modal-close {
background: none; border: none; font-size: 24px;
color: var(--ink-soft); cursor: pointer; padding: 4px 8px; font-family: inherit;
}
.modal-body { padding: 16px; }

.modal-backdrop-2 {
position: fixed; top: 0; right: 0; bottom: 0; left: 0; background: rgba(0,0,0,0.55);
z-index: 200; display: none;
padding: 20px;
}
.modal-backdrop-2.show { display: -webkit-flex; display: flex; -webkit-align-items: center; align-items: center; -webkit-justify-content: center; justify-content: center; }
.modal-2 {
background: var(--bg); width: 100%; max-width: 420px;
border-radius: 8px; overflow: hidden;
animation: fadeIn 0.2s ease;
box-shadow: 0 10px 40px rgba(0,0,0,0.3);
}
@keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

.field { margin-bottom: 14px; }
.field-label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.1em; color: var(--ink-soft); margin-bottom: 6px; }
.field-input, .field-select, .field-textarea {
width: 100%; padding: 10px 12px; border: 1px solid var(--line-strong);
border-radius: 3px; font-family: inherit; font-size: 15px; background: white; color: var(--ink);
}
.field-textarea { min-height: 70px; resize: vertical; }
.field-input:focus, .field-select:focus, .field-textarea:focus {
outline: 2px solid var(--accent); outline-offset: -1px; border-color: var(--accent);
}
.field-row { display: flex; gap: 8px; }
.field-row > .field { flex: 1; }

.chip-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
padding: 7px 12px; border: 1px solid var(--line-strong);
background: white; border-radius: 100px; font-size: 13px;
cursor: pointer; transition: all 0.15s; font-family: inherit;
}
.chip.selected { background: var(--accent); color: white; border-color: var(--accent); }
.chip.special-7 { border-style: dashed; }
.chip.special-7.selected { background: var(--danger); border-color: var(--danger); }
.chip-add { border-style: dashed; color: var(--ink-mute); }

.segment {
display: flex; border: 1px solid var(--line-strong);
border-radius: 3px; overflow: hidden;
}
.segment button {
flex: 1; padding: 9px 4px; background: white; border: none;
border-right: 1px solid var(--line-strong); font-family: inherit;
font-size: 13px; cursor: pointer; color: var(--ink-soft);
}
.segment button:last-child { border-right: none; }
.segment button.active { background: var(--ink); color: white; }

.empty { padding: 60px 20px; text-align: center; color: var(--ink-mute); }
.empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
.empty-text { font-size: 14px; line-height: 1.7; }

.dialog-actions { display: flex; gap: 8px; margin-top: 16px; }
.dialog-actions .btn { flex: 1; }

.company-edit-row {
display: flex; align-items: center; gap: 8px;
padding: 8px 0; border-bottom: 1px solid var(--line);
}
.company-edit-row:last-child { border-bottom: none; }
.company-color-swatch {
width: 28px; height: 28px; border-radius: 50%;
border: 2px solid white; box-shadow: 0 0 0 1px var(--line-strong);
cursor: pointer; flex-shrink: 0; padding: 0;
}

.color-palette { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
.color-option {
width: 36px; height: 36px; border-radius: 50%;
border: 2px solid white; box-shadow: 0 0 0 1px var(--line-strong);
cursor: pointer; transition: transform 0.15s; padding: 0;
}
.color-option.selected {
transform: scale(1.15);
box-shadow: 0 0 0 2px var(--ink);
}

.group-summary { display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 4px; }
.group-summary-pill {
padding: 3px 10px; background: var(--bg-soft);
border: 1px solid var(--line-strong); border-radius: 100px;
font-size: 11px; color: var(--ink-soft);
}
.group-summary-pill.allergy { background: #fff5f0; border-color: #ffd6c2; color: var(--accent); }

.time-picker { display: flex; gap: 6px; align-items: center; }
.time-picker select { flex: 1; }
.time-picker .time-sep { color: var(--ink-mute); font-weight: 600; }

.course-card {
background: var(--bg-card); border: 1px solid var(--line);
border-radius: 4px; padding: 14px 16px; margin-bottom: 10px;
}
.course-card-header {
display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.course-card-title-input {
flex: 1; font-size: 15px; font-weight: 600;
padding: 6px 10px; border: 1px solid var(--line-strong);
border-radius: 3px; font-family: inherit; background: white;
}

/* 印刷スタイル */
.print-area { display: none; }

/* 画面上のプレビュー専用 */
.print-area.preview {
display: block; background: white; color: black;
padding: 14px; margin: 0 -16px;
font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
font-size: 11px; box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}

/* プレビュー・印刷共通スタイル */
.print-area .doc-header {
display: flex; justify-content: space-between; align-items: flex-end;
border-bottom: 2px solid black; padding-bottom: 6px; margin-bottom: 10px;
}
.print-area .doc-title { font-size: 16pt; font-weight: 700; letter-spacing: 0.08em; }
.print-area .doc-meta { font-size: 9pt; text-align: right; line-height: 1.5; }
.print-area .info-row { display: flex; gap: 10px; margin-bottom: 6px; font-size: 10pt; flex-wrap: wrap; }
.print-area .info-row > div { flex: 1; min-width: 130px; }
.print-area .info-row .label { font-weight: 600; margin-right: 4px; color: #333; }
.print-area table {
width: 100%; border-collapse: collapse; margin-bottom: 10px;
font-size: 9pt; table-layout: fixed;
}
.print-area th, .print-area td {
border: 1px solid #333; padding: 3px 5px;
text-align: left; vertical-align: top;
word-wrap: break-word; overflow-wrap: break-word;
word-break: break-all;
}
.print-area th { background: #f0e8d8; font-weight: 600; text-align: center; font-size: 9pt; }
.print-area .table-title {
font-size: 11pt; font-weight: 700; margin: 10px 0 4px;
padding-left: 4px; border-left: 3px solid black;
}
.print-area .cell-change { background: #fffacd; }
.print-area .cell-warn { background: #ffd6d6; font-weight: 600; }
.print-area .cell-normal { background: white; }
.print-area .change-note {
font-size: 8.5pt; color: #333; margin-top: 2px;
font-weight: 400; line-height: 1.3;
}
.print-area .notes {
font-size: 9pt; margin-top: 6px; padding: 5px 7px; border: 1px solid #999;
}
.print-area .notes ul { margin: 2px 0; padding-left: 14px; }
.print-area .doc-footer {
margin-top: 10px; padding-top: 5px; border-top: 1px solid #999;
display: flex; justify-content: space-between; font-size: 8pt; color: #555;
}

/* 印刷時のスタイル */
@media print {
html, body {
margin: 0 !important;
padding: 0 !important;
background: white !important;
width: auto !important;
height: auto !important;
overflow: visible !important;
-webkit-print-color-adjust: exact !important;
print-color-adjust: exact !important;
}
/* アプリのUIを全部消す */
.app, .modal-backdrop, .modal-backdrop-2,
.btn-fab, header,
.modal, .modal-2 {
display: none !important;
}
/* 印刷エリアだけ表示 */
#printArea {
display: block !important;
position: static !important;
width: 100% !important;
max-width: none !important;
margin: 0 !important;
padding: 8mm !important;
background: white !important;
color: black !important;
box-shadow: none !important;
font-family: "Hiragino Mincho ProN", "Yu Mincho", serif !important;
font-size: 10pt;
}
/* プレビュー装飾を打ち消す */
#printArea .print-area.preview,
#printArea .print-area {
padding: 0 !important;
margin: 0 !important;
box-shadow: none !important;
}
/* テーブルの改ページ */
table { page-break-inside: auto !important; }
tr { page-break-inside: avoid !important; page-break-after: auto !important; }
thead { display: table-header-group !important; }
/* 背景色を確実に出す */
.print-area .cell-change,
.print-area .cell-warn,
.print-area th {
-webkit-print-color-adjust: exact !important;
print-color-adjust: exact !important;
}
.print-page-break { page-break-before: always !important; }
@page {
size: A4;
margin: 0;
}
}

.print-controls {
position: -webkit-sticky; position: sticky; top: 0; background: var(--bg);
padding: 10px 0; margin: -16px -16px 12px;
padding-left: 16px; padding-right: 16px;
border-bottom: 1px solid var(--line);
display: flex; gap: 8px; z-index: 5;
}

.series-entry-row {
display: flex; align-items: center; gap: 6px;
padding: 6px 0; border-bottom: 1px solid var(--line);
}
.series-entry-row:last-child { border-bottom: none; }
.series-entry-num {
font-size: 11px; color: var(--ink-mute); font-weight: 600;
min-width: 18px; text-align: right; flex-shrink: 0;
}
.series-entry-row .field-input {
padding: 7px 8px; font-size: 13px;
}
.series-remove {
width: 28px; height: 28px; flex-shrink: 0;
border: 1px solid var(--line-strong); background: white;
color: var(--ink-mute); border-radius: 3px;
cursor: pointer; font-size: 13px; font-family: inherit;
}
.series-remove:disabled { opacity: 0.3; cursor: default; }
</style>

</head>
<body>

<div class="app">
  <header>
    <div class="brand">
      <span class="brand-mark">市場小路</span>
      <span class="brand-title">アレルギー管理</span>
    </div>
    <div class="date-line" id="dateLine"></div>
    <div class="tabs">
      <button class="tab active" data-tab="today">本日</button>
      <button class="tab" data-tab="upcoming">予定</button>
      <button class="tab" data-tab="settings">設定</button>
    </div>
  </header>
  <main id="main"></main>
</div>

<button class="btn-fab" id="fabBtn" title="新規ツアー追加">＋</button>

<div class="modal-backdrop" id="modalBackdrop">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">タイトル</div>
      <button class="modal-close" id="modalClose">×</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<div class="modal-backdrop-2" id="modal2Backdrop">
  <div class="modal-2" id="modal2">
    <div style="padding:16px 18px 4px;">
      <div style="font-size:15px;font-weight:600;" id="modal2Title">入力</div>
      <div style="font-size:12px;color:var(--ink-soft);margin-top:4px;" id="modal2Message"></div>
    </div>
    <div style="padding:8px 18px 16px;">
      <input class="field-input" id="modal2Input" placeholder="" style="margin-top:8px;">
      <div class="dialog-actions">
        <button class="btn btn-outline" id="modal2Cancel">キャンセル</button>
        <button class="btn btn-accent" id="modal2Ok">OK</button>
      </div>
    </div>
  </div>
</div>

<div class="modal-backdrop-2" id="confirmBackdrop">
  <div class="modal-2">
    <div style="padding:18px;">
      <div style="font-size:15px;font-weight:600;margin-bottom:8px;" id="confirmTitle">確認</div>
      <div style="font-size:13px;color:var(--ink-soft);line-height:1.6;" id="confirmMessage"></div>
      <div class="dialog-actions">
        <button class="btn btn-outline" id="confirmCancel">キャンセル</button>
        <button class="btn btn-accent" id="confirmOk">OK</button>
      </div>
    </div>
  </div>
</div>

<div class="print-area" id="printArea"></div>

<script>
const DEFAULT_ALLERGENS = {
  required: ['えび', 'かに', 'くるみ', '小麦', 'そば', '卵', '乳', '落花生'],
  recommended: [
    'アーモンド', 'あわび', 'いか', 'いくら', 'オレンジ', 'カシューナッツ',
    'キウイフルーツ', '牛肉', 'ごま', 'さけ', 'さば', '大豆',
    '鶏肉', 'バナナ', '豚肉', 'まつたけ', 'もも', 'やまいも',
    'りんご', 'ゼラチン'
  ]
};

const DEFAULT_COURSE_ITEMS = ['先付', '前菜', 'お椀', 'お造り', '焼物', '煮物', '食事', '水菓子'];

const DEFAULT_COMPANIES = [
  { id: 'hankyu', name: '阪急交通社', color: '#1e40af' },
  { id: 'jtb', name: 'JTB', color: '#ea580c' },
  { id: 'japantours', name: 'JAPANTOURS', color: '#15803d' },
  { id: 'other', name: 'その他', color: '#666666' }
];

const COLOR_PALETTE = [
  '#1e40af', '#0891b2', '#15803d', '#65a30d',
  '#ca8a04', '#ea580c', '#dc2626', '#be185d',

];

const STORAGE_KEY = 'allergy_app_v8';

// 料理データを正規化: 文字列 → {name, subItems: []}
function normalizeItem(item) {
  if (typeof item === 'string') return { name: item, subItems: [] };
  if (!item) return { name: '', subItems: [] };
  return { name: item.name || '', subItems: (item.subItems || []).map(s => typeof s === 'string' ? s : (s.name || s)) };
}

function loadData() {
  const defaultState = {
    tours: [],
    customAllergens: [],
    courses: [
      { id: uid(), name: '市場小路美食コース', items: DEFAULT_COURSE_ITEMS.map(normalizeItem) }
    ],
    companies: [...DEFAULT_COMPANIES]
  };

  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return defaultState;
    let data;
    try { data = JSON.parse(raw); }
    catch (e) {
      console.error('parse error:', e);
      return defaultState;
    }
    if (!data || typeof data !== 'object') return defaultState;

    if (!Array.isArray(data.companies) || data.companies.length === 0) data.companies = [...DEFAULT_COMPANIES];
    if (!Array.isArray(data.customAllergens)) data.customAllergens = [];
    if (!Array.isArray(data.tours)) data.tours = [];
    if (!Array.isArray(data.courses) || data.courses.length === 0) {
      const oldDefault = data.defaultCourse || DEFAULT_COURSE_ITEMS;
      data.courses = [{
        id: uid(),
        name: '市場小路美食コース',
        items: (Array.isArray(oldDefault) ? oldDefault : DEFAULT_COURSE_ITEMS).map(normalizeItem)
      }];
      delete data.defaultCourse;
    }
    data.courses.forEach(c => {
      if (!c.id) c.id = uid();
      if (!c.name) c.name = '無題のコース';
      c.items = Array.isArray(c.items) ? c.items.map(normalizeItem) : [normalizeItem('先付')];
    });

    data.tours.forEach(t => {
      if (!t.id) t.id = uid();
      if (t.courseItems && !t.courseId) {
        const normalizedItems = (Array.isArray(t.courseItems) ? t.courseItems : []).map(normalizeItem);
        const matching = data.courses.find(c =>
          JSON.stringify(c.items.map(i => i.name)) === JSON.stringify(normalizedItems.map(i => i.name)));
        if (matching) t.courseId = matching.id;
        else t.customCourseItems = normalizedItems;
        delete t.courseItems;
      }
      if (t.customCourseItems) t.customCourseItems = t.customCourseItems.map(normalizeItem);
      if (!t.courseId && !t.customCourseItems) t.courseId = data.courses[0]?.id;
      if (typeof t.totalGuests !== 'number') t.totalGuests = 0;
      if (!Array.isArray(t.groups)) t.groups = [];
      t.groups.forEach(g => {
        if (!g.id) g.id = uid();
        if (!Array.isArray(g.allergies)) g.allergies = [];
        if (!Array.isArray(g.served)) g.served = [];
        if (!Array.isArray(g.dishStatus)) g.dishStatus = [];
        if (!Array.isArray(g.changeNotes)) g.changeNotes = [];
        if (!g.subChangeNotes || typeof g.subChangeNotes !== 'object') g.subChangeNotes = {};
        if (!g.subDishStatus || typeof g.subDishStatus !== 'object') g.subDishStatus = {};
        if (typeof g.count !== 'number') g.count = 1;
      });
    });
    return data;
  } catch (e) {
    console.error('loadData unexpected:', e);
    return defaultState;
  }
}

function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

let state = loadData();
let currentTab = 'today';
let currentCompanyFilter = 'all';
let currentTourId = null;

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function todayStr() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function formatDate(s) {
  if (!s) return '';
  const [y, m, d] = s.split('-');
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
}

function dayOfWeek(s) {
  if (!s) return '';
  const days = ['日', '月', '火', '水', '木', '金', '土'];
  return days[new Date(s).getDay()];
}

function escHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function getCompany(id) {
  return state.companies.find(c => c.id === id) || { id: 'unknown', name: '未設定', color: '#999' };
}

function getCourse(id) {
  return state.courses.find(c => c.id === id);
}

function getTourCourseItems(tour) {
  if (tour.customCourseItems) return tour.customCourseItems;
  const c = getCourse(tour.courseId);
  if (c) return c.items;
  return [];
}

function getItemName(item) {
  if (typeof item === 'string') return item;
  return item ? item.name : '';
}

function getItemSubs(item) {
  if (typeof item === 'string') return [];
  return (item && item.subItems) || [];
}

// 全コースから過去に使った料理名を収集（中身付き or 単独で）
function getDishHistory() {
  const seen = new Map(); // name -> [subItems配列のリスト]
  state.courses.forEach(c => {
    c.items.forEach(item => {
      const name = getItemName(item);
      const subs = getItemSubs(item);
      if (!name) return;
      if (!seen.has(name)) seen.set(name, []);
      // 中身付きパターンを記録（重複は除く）
      const subsKey = subs.join('|');
      const list = seen.get(name);
      if (!list.some(s => s.join('|') === subsKey)) {
        list.push([...subs]);
      }
    });
  });
  // 配列化
  const result = [];
  seen.forEach((subsList, name) => {
    subsList.forEach(subs => {
      result.push({ name, subItems: subs });
    });
  });
  return result;
}

// 全コースから過去に使った副品名を収集（重複なし）
function getSubItemHistory() {
  const seen = new Set();
  state.courses.forEach(c => {
    c.items.forEach(item => {
      getItemSubs(item).forEach(s => {
        if (s && s.trim()) seen.add(s.trim());
      });
    });
  });
  return Array.from(seen).sort();
}

function getTourCourseName(tour) {
  if (tour.customCourseItems) return '（このツアー専用）';
  const c = getCourse(tour.courseId);
  return c ? c.name : '未設定';
}

function totalGroupCount(tour) {
  return (tour.groups || []).reduce((sum, g) => sum + (g.count || 0), 0);
}

function generalGuestCount(tour) {
  const allergyTotal = totalGroupCount(tour);
  return Math.max(0, (tour.totalGuests || 0) - allergyTotal);
}

function tourProgress(tour) {
  const course = getTourCourseItems(tour);
  const groups = tour.groups || [];
  if (groups.length === 0) return { done: 0, total: 0, pct: 0 };
  let done = 0, total = 0;
  groups.forEach(g => {
    course.forEach((_, i) => {
      total++;
      if (g.served && g.served[i]) done++;
    });
  });
  return { done, total, pct: total ? Math.round(done/total*100) : 0 };
}

// ダイアログ
function showPrompt(title, message, placeholder, callback, defaultValue) {
  const backdrop = document.getElementById('modal2Backdrop');
  const titleEl = document.getElementById('modal2Title');
  const messageEl = document.getElementById('modal2Message');
  const inputEl = document.getElementById('modal2Input');
  const okBtn = document.getElementById('modal2Ok');
  const cancelBtn = document.getElementById('modal2Cancel');

  titleEl.textContent = title || '入力';
  messageEl.textContent = message || '';
  messageEl.style.display = message ? 'block' : 'none';
  inputEl.value = defaultValue || '';
  inputEl.placeholder = placeholder || '';

  backdrop.classList.add('show');
  setTimeout(() => inputEl.focus(), 100);

  function cleanup() {
    backdrop.classList.remove('show');
    okBtn.removeEventListener('click', onOk);
    cancelBtn.removeEventListener('click', onCancel);
    inputEl.removeEventListener('keydown', onKey);
  }
  function onOk() { const v = inputEl.value; cleanup(); callback(v); }
  function onCancel() { cleanup(); callback(null); }
  function onKey(e) {
    if (e.key === 'Enter') onOk();
    else if (e.key === 'Escape') onCancel();
  }
  okBtn.addEventListener('click', onOk);
  cancelBtn.addEventListener('click', onCancel);
  inputEl.addEventListener('keydown', onKey);
}

function showConfirm(title, message, callback) {
  const backdrop = document.getElementById('confirmBackdrop');
  const titleEl = document.getElementById('confirmTitle');
  const messageEl = document.getElementById('confirmMessage');
  const okBtn = document.getElementById('confirmOk');
  const cancelBtn = document.getElementById('confirmCancel');
  titleEl.textContent = title || '確認';
  messageEl.innerHTML = (message || '').replace(/\n/g, '<br>');
  cancelBtn.style.display = '';
  okBtn.textContent = 'OK';
  backdrop.classList.add('show');
  function cleanup() {
    backdrop.classList.remove('show');
    okBtn.removeEventListener('click', onOk);
    cancelBtn.removeEventListener('click', onCancel);
  }
  function onOk() { cleanup(); callback(true); }
  function onCancel() { cleanup(); callback(false); }
  okBtn.addEventListener('click', onOk);
  cancelBtn.addEventListener('click', onCancel);
}

function showAlert(message, callback) {
  const backdrop = document.getElementById('confirmBackdrop');
  const titleEl = document.getElementById('confirmTitle');
  const messageEl = document.getElementById('confirmMessage');
  const okBtn = document.getElementById('confirmOk');
  const cancelBtn = document.getElementById('confirmCancel');
  titleEl.textContent = 'お知らせ';
  messageEl.innerHTML = (message || '').replace(/\n/g, '<br>');
  cancelBtn.style.display = 'none';
  okBtn.textContent = 'OK';
  backdrop.classList.add('show');
  function cleanup() {
    backdrop.classList.remove('show');
    okBtn.removeEventListener('click', onOk);
    cancelBtn.style.display = '';
    okBtn.textContent = 'OK';
  }
  function onOk() { cleanup(); if (callback) callback(); }
  okBtn.addEventListener('click', onOk);
}

function buildTimeOptions(currentTime) {
  let curHour = '', curMin = '';
  if (currentTime && currentTime.includes(':')) {
    const parts = currentTime.split(':');
    curHour = parts[0].padStart(2, '0');
    curMin = parts[1].padStart(2, '0');
  }
  let hourOptions = '<option value="">--</option>';
  for (let h = 0; h < 24; h++) {
    const v = String(h).padStart(2, '0');
    hourOptions += `<option value="${v}" ${v === curHour ? 'selected' : ''}>${v}</option>`;
  }
  let minOptions = '<option value="">--</option>';
  for (let m = 0; m < 60; m += 5) {
    const v = String(m).padStart(2, '0');
    minOptions += `<option value="${v}" ${v === curMin ? 'selected' : ''}>${v}</option>`;
  }
  return { hourOptions, minOptions };
}

function readTimeFromPicker(hourId, minId) {
  const h = document.getElementById(hourId).value;
  const m = document.getElementById(minId).value;
  if (!h && !m) return '';
  return `${h || '00'}:${m || '00'}`;
}

function renderDateLine() {
  const d = new Date();
  const wd = ['日', '月', '火', '水', '木', '金', '土'][d.getDay()];
  document.getElementById('dateLine').textContent = `${d.getFullYear()}年 ${d.getMonth()+1}月 ${d.getDate()}日（${wd}）`;
}

function render() {
  const main = document.getElementById('main');
  if (currentTab === 'today') renderToday(main);
  else if (currentTab === 'upcoming') renderUpcoming(main);
  else if (currentTab === 'settings') renderSettings(main);

  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === currentTab);
  });
}

function renderFilterBar() {
  const counts = { all: 0 };
  state.tours.forEach(t => {
    counts.all++;
    counts[t.companyId] = (counts[t.companyId] || 0) + 1;
  });
  const items = [{ id: 'all', name: 'すべて', color: null }, ...state.companies];
  return `<div class="filter-bar">
    ${items.map(item => `
      <button class="filter-pill ${currentCompanyFilter === item.id ? 'active' : ''}"
              data-filter="${item.id}"
              ${item.color ? `style="${currentCompanyFilter === item.id ? `background:${item.color};border-color:${item.color};` : ''}"` : ''}>
        ${item.color ? `<span class="pill-dot" style="background:${item.color};"></span>` : ''}
        ${escHtml(item.name)} ${counts[item.id] || 0}
      </button>
    `).join('')}
  </div>`;
}

function applyCompanyFilter(tours) {
  if (currentCompanyFilter === 'all') return tours;
  return tours.filter(t => t.companyId === currentCompanyFilter);
}

function renderToday(main) {
  const today = todayStr();
  let todays = state.tours.filter(t => t.date === today);
  todays = applyCompanyFilter(todays);

  let html = renderFilterBar();
  html += `<div class="section-title">本日のツアー <span class="count">${todays.length}件</span></div>`;

  if (todays.length === 0) {
    html += `<div class="empty">
      <div class="empty-icon">◇</div>
      <div class="empty-text">${currentCompanyFilter === 'all' ? '本日のツアーは登録されていません<br>右下の「＋」ボタンから追加できます' : '該当するツアーはありません'}</div>
    </div>`;
  } else {
    if (currentCompanyFilter === 'all') {
      const grouped = {};
      todays.forEach(t => {
        if (!grouped[t.companyId]) grouped[t.companyId] = [];
        grouped[t.companyId].push(t);
      });
      state.companies.forEach(company => {
        if (grouped[company.id]) {
          html += `<div class="group-header">
            <span class="group-dot" style="background:${company.color};"></span>
            ${escHtml(company.name)}（${grouped[company.id].length}件）
          </div>`;
          grouped[company.id].forEach(t => html += renderTourCard(t));
        }
      });
    } else {
      todays.forEach(t => html += renderTourCard(t));
    }
  }

  if (todays.length > 0) {
    html += `<button type="button" class="btn btn-outline btn-block" id="btn-print-list" style="margin-top:20px;">本日のツアーリストを印刷</button>`;
  }

  main.innerHTML = html;
  attachFilterEvents();
  attachTourCardEvents();
  const listBtn = document.getElementById('btn-print-list');
  if (listBtn) listBtn.addEventListener('click', () => openTourListPrint('today'));
}

function renderUpcoming(main) {
  const today = todayStr();
  let upcoming = state.tours.filter(t => t.date >= today).sort((a, b) => a.date.localeCompare(b.date));
  upcoming = applyCompanyFilter(upcoming);

  let html = renderFilterBar();
  html += `<div class="section-title">予定一覧 <span class="count">${upcoming.length}件</span></div>`;

  if (upcoming.length === 0) {
    html += `<div class="empty"><div class="empty-icon">◇</div><div class="empty-text">予定はありません</div></div>`;
  } else {
    let lastDate = '';
    upcoming.forEach(t => {
      if (t.date !== lastDate) {
        html += `<div style="font-size:13px;color:var(--ink-mute);margin:18px 0 8px;letter-spacing:0.1em;">
          ${formatDate(t.date)}（${dayOfWeek(t.date)}）
        </div>`;
        lastDate = t.date;
      }
      html += renderTourCard(t);
    });
    html += `<button type="button" class="btn btn-outline btn-block" id="btn-print-list" style="margin-top:20px;">期間を選んでリスト印刷</button>`;
  }

  main.innerHTML = html;
  attachFilterEvents();
  attachTourCardEvents();
  const listBtn = document.getElementById('btn-print-list');
  if (listBtn) listBtn.addEventListener('click', () => openTourListPrint('upcoming'));
}

function attachFilterEvents() {
  document.querySelectorAll('[data-filter]').forEach(el => {
    el.addEventListener('click', () => {
      currentCompanyFilter = el.dataset.filter;
      render();
    });
  });
}

function renderTourCard(t) {
  const company = getCompany(t.companyId);
  const prog = tourProgress(t);
  const allergyCount = totalGroupCount(t);
  const generalCount = generalGuestCount(t);

  return `<div class="card card-clickable tour-card" data-tour-id="${t.id}" style="border-left-color:${company.color};">
    <div class="tour-card-header">
      <div style="flex:1;min-width:0;">
        <div class="tour-company">${escHtml(company.name)}</div>
        <div class="tour-name">${escHtml(t.name) || '（無題のツアー）'}</div>
        <div class="tour-meta">
          ${escHtml(t.time) || '時間未定'} ・ 全${t.totalGuests || 0}名 ・ ${escHtml(getTourCourseName(t))}
        </div>
        <div class="group-summary">
          ${allergyCount > 0 ? `<span class="group-summary-pill allergy">アレルギー対応 ${allergyCount}名（${(t.groups || []).length}グループ）</span>` : ''}
          ${generalCount > 0 ? `<span class="group-summary-pill">一般 ${generalCount}名</span>` : ''}
        </div>
      </div>
      ${prog.pct === 100 ? '<span class="badge badge-ok">完了</span>' :
        prog.done > 0 ? '<span class="badge badge-info">対応中</span>' :
        allergyCount > 0 ? '<span class="badge badge-warn">未対応</span>' : ''}
    </div>
    ${(allergyCount > 0) ? `
      <div class="tour-progress">
        <div class="tour-progress-bar" style="width:${prog.pct}%"></div>
      </div>
      <div class="tour-progress-text">
        <span>提供進捗</span>
        <span>${prog.done} / ${prog.total}</span>
      </div>` : ''}
  </div>`;
}

function bindSettingsEvents() {
  // 会社編集
  document.querySelectorAll('[data-company-name]').forEach(input => {
    input.addEventListener('change', e => {
      const id = e.target.dataset.companyName;
      const c = state.companies.find(x => x.id === id);
      if (c) { c.name = e.target.value.trim() || c.name; saveData(); }
    });
  });
  document.querySelectorAll('[data-edit-color]').forEach(btn => {
    btn.addEventListener('click', () => openColorPicker(btn.dataset.editColor));
  });
  document.querySelectorAll('[data-remove-company]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.removeCompany;
      const c = state.companies.find(x => x.id === id);
      const inUse = state.tours.some(t => t.companyId === id);
      if (inUse) { showAlert(`「${c.name}」は使用中のツアーがあるため削除できません。`); return; }
      if (state.companies.length <= 1) { showAlert('会社は1つ以上必要です'); return; }
      showConfirm('削除確認', `「${c.name}」を削除しますか？`, ok => {
        if (ok) {
          state.companies = state.companies.filter(x => x.id !== id);
          saveData(); render();
        }
      });
    });
  });
  document.getElementById('addCompanyBtn').addEventListener('click', () => {
    showPrompt('会社を追加', '', '例：日本旅行', val => {
      if (val && val.trim()) {
        const usedColors = state.companies.map(c => c.color);
        const newColor = COLOR_PALETTE.find(c => !usedColors.includes(c)) || COLOR_PALETTE[0];
        state.companies.push({ id: uid(), name: val.trim(), color: newColor });
        saveData(); render();
      }
    });
  });

  // コース編集
  document.querySelectorAll('[data-course-name]').forEach(input => {
    input.addEventListener('change', e => {
      const id = e.target.dataset.courseName;
      const c = getCourse(id);
      if (c) { c.name = e.target.value.trim() || c.name; saveData(); }
    });
  });
  // 料理名の編集（サブインデックスなし）
  document.querySelectorAll('[data-course-id][data-item-idx]:not([data-sub-idx])').forEach(input => {
    if (input.tagName !== 'INPUT') return;
    input.addEventListener('change', e => {
      const cid = e.target.dataset.courseId;
      const idx = parseInt(e.target.dataset.itemIdx);
      const c = getCourse(cid);
      if (c && c.items[idx]) {
        c.items[idx] = normalizeItem(c.items[idx]);
        c.items[idx].name = e.target.value;
        saveData();
      }
    });
  });
  // 中身の編集
  document.querySelectorAll('[data-sub-idx]').forEach(input => {
    if (input.tagName !== 'INPUT') return;
    input.addEventListener('change', e => {
      const cid = e.target.dataset.courseId;
      const idx = parseInt(e.target.dataset.itemIdx);
      const sidx = parseInt(e.target.dataset.subIdx);
      const c = getCourse(cid);
      if (c && c.items[idx]) {
        c.items[idx] = normalizeItem(c.items[idx]);
        c.items[idx].subItems[sidx] = e.target.value;
        saveData();
      }
    });
  });
  // 中身の削除
  document.querySelectorAll('[data-remove-sub]').forEach(btn => {
    btn.addEventListener('click', () => {
      const cid = btn.dataset.courseId;
      const idx = parseInt(btn.dataset.itemIdx);
      const sidx = parseInt(btn.dataset.subIdx);
      const c = getCourse(cid);
      if (!c || !c.items[idx]) return;
      const item = normalizeItem(c.items[idx]);
      c.items[idx] = item;
      const subName = item.subItems[sidx];
      showConfirm('削除確認', `「${subName}」を削除しますか？`, ok => {
        if (ok) {
          item.subItems.splice(sidx, 1);
          // ツアーの subChangeNotes / subDishStatus も整理
          state.tours.forEach(t => {
            if (t.courseId === cid) {
              t.groups.forEach(g => {
                const key = `${idx}_${sidx}`;
                if (g.subChangeNotes) delete g.subChangeNotes[key];
                if (g.subDishStatus) delete g.subDishStatus[key];
              });
            }
          });
          saveData(); render();
        }
      });
    });
  });
  // 中身の追加
  document.querySelectorAll('[data-add-sub]').forEach(btn => {
    btn.addEventListener('click', () => {
      const cid = btn.dataset.courseId;
      const idx = parseInt(btn.dataset.itemIdx);
      const c = getCourse(cid);
      if (!c || !c.items[idx]) return;
      const item = normalizeItem(c.items[idx]);
      c.items[idx] = item;
      showPrompt('中身を追加', `「${item.name}」の中身を追加`, '例：切り干し大根', val => {
        if (val && val.trim()) {
          item.subItems.push(val.trim());
          saveData(); render();
        }
      });
    });
  });
  document.querySelectorAll('[data-remove-item]').forEach(btn => {
    btn.addEventListener('click', () => {
      const cid = btn.dataset.courseId;
      const idx = parseInt(btn.dataset.itemIdx);
      const c = getCourse(cid);
      if (!c) return;
      if (c.items.length <= 1) { showAlert('料理は1つ以上必要です'); return; }
      const item = c.items[idx];
      const itemName = getItemName(item);
      showConfirm('削除確認', `「${itemName}」を削除しますか？`, ok => {
        if (ok) {
          c.items.splice(idx, 1);
          state.tours.forEach(t => {
            if (t.courseId === cid) {
              (t.groups || []).forEach(g => {
                if (g.served) g.served.splice(idx, 1);
                if (g.dishStatus) g.dishStatus.splice(idx, 1);
                if (g.changeNotes) g.changeNotes.splice(idx, 1);
                // subDishStatus/subChangeNotes のキーをずらす
                if (g.subDishStatus) {
                  const newSub = {};
                  Object.keys(g.subDishStatus).forEach(k => {
                    const [i, s] = k.split('_').map(Number);
                    if (i < idx) newSub[k] = g.subDishStatus[k];
                    else if (i > idx) newSub[`${i-1}_${s}`] = g.subDishStatus[k];
                  });
                  g.subDishStatus = newSub;
                }
                if (g.subChangeNotes) {
                  const newSub = {};
                  Object.keys(g.subChangeNotes).forEach(k => {
                    const [i, s] = k.split('_').map(Number);
                    if (i < idx) newSub[k] = g.subChangeNotes[k];
                    else if (i > idx) newSub[`${i-1}_${s}`] = g.subChangeNotes[k];
                  });
                  g.subChangeNotes = newSub;
                }
              });
            }
          });
          saveData(); render();
        }
      });
    });
  });
  document.querySelectorAll('[data-add-item]').forEach(btn => {
    btn.addEventListener('click', () => {
      const cid = btn.dataset.addItem;
      const c = getCourse(cid);
      if (!c) return;
      showPrompt('料理を追加', `「${c.name}」に料理を追加`, '例：八寸', val => {
        if (val && val.trim()) {
          c.items.push(normalizeItem(val.trim()));
          state.tours.forEach(t => {
            if (t.courseId === cid) {
              (t.groups || []).forEach(g => {
                if (!g.served) g.served = [];
                if (!g.dishStatus) g.dishStatus = [];
                if (!g.changeNotes) g.changeNotes = [];
                g.served.push(false);
                g.dishStatus.push('normal');
                g.changeNotes.push('');
              });
            }
          });
          saveData(); render();
        }
      });
    });
  });

  // 料理を履歴から選ぶ
  document.querySelectorAll('[data-pick-item]').forEach(btn => {
    btn.addEventListener('click', () => {
      const cid = btn.dataset.pickItem;
      openPickItemFromHistory(cid);
    });
  });

  // 中身を履歴から選ぶ
  document.querySelectorAll('[data-pick-sub]').forEach(btn => {
    btn.addEventListener('click', () => {
      const cid = btn.dataset.courseId;
      const idx = parseInt(btn.dataset.itemIdx);
      openPickSubFromHistory(cid, idx);
    });
  });
  // コースの複製
  document.querySelectorAll('[data-duplicate-course]').forEach(btn => {
    btn.addEventListener('click', () => {
      const cid = btn.dataset.duplicateCourse;
      const c = getCourse(cid);
      if (!c) return;
      showPrompt('コースを複製', `「${c.name}」を複製します。新しいコース名を入力してください`, '', val => {
        if (val && val.trim()) {
          const newCourse = {
            id: uid(),
            name: val.trim(),
            items: c.items.map(item => ({
              name: getItemName(item),
              subItems: [...getItemSubs(item)]
            }))
          };
          state.courses.push(newCourse);
          saveData(); render();
        }
      }, `${c.name}（コピー）`);
    });
  });

  document.querySelectorAll('[data-remove-course]').forEach(btn => {
    btn.addEventListener('click', () => {
      const cid = btn.dataset.removeCourse;
      const c = getCourse(cid);
      if (!c) return;
      const inUse = state.tours.some(t => t.courseId === cid);
      if (inUse) { showAlert(`「${c.name}」は使用中のツアーがあるため削除できません。`); return; }
      if (state.courses.length <= 1) { showAlert('コースは1つ以上必要です'); return; }
      showConfirm('削除確認', `コース「${c.name}」を削除しますか？`, ok => {
        if (ok) {
          state.courses = state.courses.filter(x => x.id !== cid);
          saveData(); render();
        }
      });
    });
  });
  document.getElementById('addCourseBtn').addEventListener('click', () => {
    showPrompt('新しいコース', 'コース名を入力してください', '例：懐石コース', val => {
      if (val && val.trim()) {
        state.courses.push({ id: uid(), name: val.trim(), items: [normalizeItem('先付')] });
        saveData(); render();
      }
    });
  });

  // アレルギー項目
  document.querySelectorAll('[data-remove-custom]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.removeCustom);
      showConfirm('削除確認', `「${state.customAllergens[idx]}」を削除しますか？`, ok => {
        if (ok) { state.customAllergens.splice(idx, 1); saveData(); render(); }
      });
    });
  });
  document.getElementById('addCustomBtn').addEventListener('click', () => {
    showPrompt('アレルギー項目を追加', '28品目以外で対応が必要な項目', '例：マンゴー', val => {
      if (val && val.trim()) {
        state.customAllergens.push(val.trim());
        saveData(); render();
      }
    });
  });

  document.getElementById('exportBtn').addEventListener('click', exportData);
  document.getElementById('importBtn').addEventListener('click', importData);
  document.getElementById('clearOldBtn').addEventListener('click', clearOld);
  document.getElementById('resetBtn').addEventListener('click', () => {
    showConfirm('データ削除', 'すべてのデータを削除しますか？\nこの操作は取り消せません。', ok => {
      if (ok) showConfirm('最終確認', '本当によろしいですか？', ok2 => {
        if (ok2) {
          localStorage.removeItem(STORAGE_KEY);
          state = loadData();
          render();
        }
      });
    });
  });
}

// 履歴から料理を選んで追加（中身付きも可）
function openPickItemFromHistory(courseId) {
  const c = getCourse(courseId);
  if (!c) return;
  const history = getDishHistory();

  // 現在のコースに既に入ってる料理は除外しない（重複もOK）
  if (history.length === 0) {
    showAlert('まだ履歴がありません。\n「＋ 料理を追加」から最初の料理を登録してください。');
    return;
  }

  document.getElementById('modalTitle').textContent = `料理を履歴から選ぶ`;
  document.getElementById('modalBody').innerHTML = `
    <div style="font-size:13px;color:var(--ink-soft);margin-bottom:14px;">
      過去に登録した料理から選びます。中身付きパターンは「└」付きで表示されます。タップで「${escHtml(c.name)}」に追加されます。
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;">
      ${history.map((h, i) => `
        <button type="button" class="card card-clickable" data-pick-history-idx="${i}" style="margin:0;padding:10px 14px;text-align:left;border-left:3px solid var(--accent);cursor:pointer;font-family:inherit;width:100%;">
          <div style="font-size:14px;font-weight:600;">${escHtml(h.name)}</div>
          ${h.subItems.length > 0 ? `
            <div style="padding-left:12px;margin-top:4px;">
              ${h.subItems.map(s => `<div style="font-size:12px;color:var(--ink-soft);">└ ${escHtml(s)}</div>`).join('')}
            </div>
          ` : '<div style="font-size:11px;color:var(--ink-mute);margin-top:2px;">中身なし</div>'}
        </button>
      `).join('')}
    </div>
    <div class="dialog-actions" style="margin-top:14px;">
      <button type="button" class="btn btn-outline" id="btn-cancel-pick">キャンセル</button>
    </div>
  `;

  document.querySelectorAll('[data-pick-history-idx]').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = parseInt(btn.dataset.pickHistoryIdx);
      const picked = history[idx];
      c.items.push({
        name: picked.name,
        subItems: [...picked.subItems]
      });
      // ツアー側の各種配列も追加
      state.tours.forEach(t => {
        if (t.courseId === courseId) {
          (t.groups || []).forEach(g => {
            if (!g.served) g.served = [];
            if (!g.dishStatus) g.dishStatus = [];
            if (!g.changeNotes) g.changeNotes = [];
            g.served.push(false);
            g.dishStatus.push('normal');
            g.changeNotes.push('');
          });
        }
      });
      saveData(); closeModal(); render();
    });
  });
  document.getElementById('btn-cancel-pick').addEventListener('click', closeModal);
  showModal();
}

// 履歴から中身を選んで追加
function openPickSubFromHistory(courseId, itemIdx) {
  const c = getCourse(courseId);
  if (!c || !c.items[itemIdx]) return;
  const item = normalizeItem(c.items[itemIdx]);
  c.items[itemIdx] = item;
  const history = getSubItemHistory();
  // 既に入ってる中身を除外
  const available = history.filter(s => !item.subItems.includes(s));

  if (available.length === 0) {
    if (history.length === 0) {
      showAlert('まだ中身の履歴がありません。\n「＋ 中身を追加」から最初の中身を登録してください。');
    } else {
      showAlert('追加できる中身がありません。\n（履歴の中身は全てこの料理に追加済みです）');
    }
    return;
  }

  // 選択状態を管理
  const selected = new Set();

  document.getElementById('modalTitle').textContent = `中身を履歴から選ぶ`;

  function paint() {
    document.getElementById('modalBody').innerHTML = `
      <div style="font-size:13px;color:var(--ink-soft);margin-bottom:14px;">
        「${escHtml(item.name)}」に追加する中身を選択（複数選択可）
      </div>
      <div class="chip-grid" style="margin-bottom:14px;">
        ${available.map((s, i) => `
          <button type="button" class="chip ${selected.has(i) ? 'selected' : ''}" data-pick-sub-idx="${i}">${escHtml(s)}</button>
        `).join('')}
      </div>
      <div style="font-size:11px;color:var(--ink-mute);margin-bottom:14px;">
        ${selected.size}件選択中
      </div>
      <div class="dialog-actions">
        <button type="button" class="btn btn-outline" id="btn-cancel-pick-sub">キャンセル</button>
        <button type="button" class="btn btn-accent" id="btn-confirm-pick-sub" ${selected.size === 0 ? 'disabled' : ''}>追加（${selected.size}件）</button>
      </div>
    `;

    document.querySelectorAll('[data-pick-sub-idx]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.pickSubIdx);
        if (selected.has(idx)) selected.delete(idx);
        else selected.add(idx);
        paint();
      });
    });

    document.getElementById('btn-cancel-pick-sub').addEventListener('click', closeModal);
    document.getElementById('btn-confirm-pick-sub').addEventListener('click', () => {
      Array.from(selected).sort((a, b) => a - b).forEach(i => {
        item.subItems.push(available[i]);
      });
      saveData(); closeModal(); render();
    });
  }

  paint();
  showModal();
}

    <div class="field">
      <label class="field-label">コース</label>
      <select class="field-select" id="sb-course">
        ${state.courses.map(c => `<option value="${c.id}">${escHtml(c.name)}（${c.items.length}品）</option>`).join('')}

    <div class="field">
      <label class="field-label">備考（全日程共通・任意）</label>
      <textarea class="field-textarea" id="sb-note" placeholder="連絡事項など"></textarea>
    </div>
    <div class="section-title" style="margin-top:20px;">
      日程リスト
      <span class="count">来店日 ・ 時間 ・ 人数</span>
    </div>
    <div id="sb-entries">${renderEntriesHtml()}</div>
    <button type="button" class="btn btn-outline btn-block" id="sb-add-row" style="margin-top:8px;font-size:13px;">＋ 日程を追加</button>
    <div class="dialog-actions">
      <button type="button" class="btn btn-outline" id="sb-cancel">キャンセル</button>
      <button type="button" class="btn btn-accent" id="sb-save">一括登録</button>
    </div>
  `;

  // Event delegation on the entries container
  const entriesContainer = document.getElementById('sb-entries');
  entriesContainer.addEventListener('input', ev => {
    const i = ev.target.dataset.i;
    if (i === undefined) return;
    if (ev.target.classList.contains('series-date')) entries[+i].date = ev.target.value;
    else if (ev.target.classList.contains('series-time')) entries[+i].time = ev.target.value;
    else if (ev.target.classList.contains('series-guests')) entries[+i].guests = ev.target.value;
  });
  entriesContainer.addEventListener('click', ev => {
    const btn = ev.target.closest('.series-remove');
    if (!btn || btn.disabled) return;
    const i = +btn.dataset.i;
    entries.splice(i, 1);
    entriesContainer.innerHTML = renderEntriesHtml();
  });

  document.getElementById('sb-add-row').addEventListener('click', () => {
    const last = entries[entries.length - 1];
    entries.push({ date: last.date, time: last.time, guests: last.guests });
    entriesContainer.innerHTML = renderEntriesHtml();
  });

  document.getElementById('sb-cancel').addEventListener('click', closeModal);

  document.getElementById('sb-save').addEventListener('click', () => {
    const name = document.getElementById('sb-name').value.trim();
    if (!name) { showAlert('ツアー名を入力してください'); return; }
    const validEntries = entries.filter(e => e.date);
    if (validEntries.length === 0) { showAlert('来店日を1件以上入力してください'); return; }
    const companyId = document.getElementById('sb-company').value;
    const courseId = document.getElementById('sb-course').value;
    const note = document.getElementById('sb-note').value.trim();
    validEntries.forEach(e => {
      state.tours.push({
        id: uid(),
        companyId,
        name,
        date: e.date,
        time: e.time,
        totalGuests: parseInt(e.guests) || 0,
        courseId,
        note,
        groups: []
      });
    });
    saveData();
    closeModal();
    render();
    showAlert(`${validEntries.length}件のツアーを登録しました`);
  });

  showModal();
}

function captureForm() {
const c = document.getElementById('g-count');
const l = document.getElementById('g-label');
const n = document.getElementById('g-note');
if (c) group.count = parseInt(c.value) || 1;
if (l) group.label = l.value;
if (n) group.note = n.value;
// 各料理のメモ
course.forEach((_, i) => {
const t = document.querySelector(`[data-dish-note="${i}"]`);
if (t) group.changeNotes[i] = t.value;
});
// 副品のメモ
if (!group.subChangeNotes) group.subChangeNotes = {};
document.querySelectorAll('[data-sub-note]').forEach(t => {
group.subChangeNotes[t.dataset.subNote] = t.value;
});
}

function bind() {
document.querySelectorAll('[data-allergen]').forEach(btn => {
btn.addEventListener('click', () => {
const a = btn.dataset.allergen;
const idx = group.allergies.indexOf(a);
if (idx >= 0) group.allergies.splice(idx, 1);
else group.allergies.push(a);
btn.classList.toggle('selected');
});
});

document.getElementById('g-add-temp').addEventListener('click', () => {
  captureForm();
  showPrompt('このグループだけに追加', '設定には保存されません', '例：マンゴー', val => {
    if (val && val.trim()) {
      const trimmed = val.trim();
      if (!tempAllergens.includes(trimmed)) tempAllergens.push(trimmed);
      if (!group.allergies.includes(trimmed)) group.allergies.push(trimmed);
      paint();
    }
  });
});

document.getElementById('g-add-permanent').addEventListener('click', () => {
  captureForm();
  showPrompt('設定に保存して追加', '次回以降も使えるようになります', '例：マンゴー', val => {
    if (val && val.trim()) {
      const trimmed = val.trim();
      if (!state.customAllergens.includes(trimmed)) state.customAllergens.push(trimmed);
      if (!group.allergies.includes(trimmed)) group.allergies.push(trimmed);
      saveData(); paint();
    }
  });
});

document.querySelectorAll('[data-contam]').forEach(btn => {
  btn.addEventListener('click', () => {
    const v = btn.dataset.contam;
    group.contamOk = v === 'true' ? true : v === 'false' ? false : undefined;
    document.querySelectorAll('[data-contam]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

document.querySelectorAll('[data-dish-status]').forEach(sel => {
  sel.addEventListener('change', e => {
    const idx = parseInt(e.target.dataset.dishStatus);
    captureForm();
    group.dishStatus[idx] = e.target.value;
    if (e.target.value === 'normal') group.changeNotes[idx] = '';
    paint();
  });
});

document.querySelectorAll('[data-dish-note]').forEach(t => {
  t.addEventListener('input', e => {
    const idx = parseInt(e.target.dataset.dishNote);
    group.changeNotes[idx] = e.target.value;
  });
});

// 副品のステータス変更
document.querySelectorAll('[data-sub-status]').forEach(sel => {
  sel.addEventListener('change', e => {
    const key = e.target.dataset.subStatus;
    captureForm();
    if (!group.subDishStatus) group.subDishStatus = {};
    group.subDishStatus[key] = e.target.value;
    if (e.target.value === 'normal' && group.subChangeNotes) {
      delete group.subChangeNotes[key];
    }
    paint();
  });
});

document.querySelectorAll('[data-sub-note]').forEach(t => {
  t.addEventListener('input', e => {
    const key = e.target.dataset.subNote;
    if (!group.subChangeNotes) group.subChangeNotes = {};
    group.subChangeNotes[key] = e.target.value;
  });
});

document.getElementById('btn-save-group').addEventListener('click', () => {
  captureForm();
  if (group.count < 1) { showAlert('人数は1名以上必要です'); return; }
  while (group.served.length < course.length) group.served.push(false);
  while (group.dishStatus.length < course.length) group.dishStatus.push('normal');
  while (group.changeNotes.length < course.length) group.changeNotes.push('');

  if (!tour.groups) tour.groups = [];
  if (isNew) tour.groups.push(group);
  else tour.groups[groupIdx] = group;

  const newAllergyTotal = totalGroupCount(tour);
  if (newAllergyTotal > tour.totalGuests) {
    showConfirm('人数の確認',
      `アレルギー対応の合計（${newAllergyTotal}名）が全体人数（${tour.totalGuests}名）を超えています。\n全体人数を ${newAllergyTotal} 名に更新しますか？`,
      ok => {
        if (ok) tour.totalGuests = newAllergyTotal;
        saveData(); closeModal(); openTourDetail();
      });
  } else {
    saveData(); closeModal(); openTourDetail();
  }
});

if (!isNew) {
  document.getElementById('btn-delete-group').addEventListener('click', () => {
    showConfirm('削除確認', 'このグループを削除しますか？', ok => {
      if (ok) {
        tour.groups.splice(groupIdx, 1);
        saveData(); closeModal(); openTourDetail();
      }
    });
  });
}

}

paint();
showModal();
}

function openGroupServe(groupIdx) {
const tour = state.tours.find(t => t.id === currentTourId);
if (!tour) return;
const group = tour.groups[groupIdx];
if (!group) return;
const course = getTourCourseItems(tour);

while (group.served.length < course.length) group.served.push(false);
if (!group.dishStatus) group.dishStatus = course.map(() => 'normal');
while (group.dishStatus.length < course.length) group.dishStatus.push('normal');
if (!group.changeNotes) group.changeNotes = course.map(() => '');
while (group.changeNotes.length < course.length) group.changeNotes.push('');

document.getElementById('modalTitle').textContent = group.label || `${(group.allergies||[]).join('・') || 'グループ'} ${group.count}名`;

const allergyText = group.allergies && group.allergies.length ? group.allergies.join('・') : 'なし';

document.getElementById('modalBody').innerHTML = `<div class="card" style="margin-bottom:14px;background:var(--bg-soft);"> <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:6px;"> <div style="font-size:11px;color:var(--ink-mute);letter-spacing:0.1em;">アレルギー</div> <div style="font-size:11px;color:var(--accent);font-weight:600;">${group.count}名</div> </div> <div style="font-size:14px;font-weight:600;margin-bottom:8px;">${escHtml(allergyText)}</div> <div style="display:flex;gap:6px;flex-wrap:wrap;"> ${group.contamOk === true ? '<span class="badge badge-info">コンタミ可</span>' : ''} ${group.contamOk === false ? '<span class="badge badge-danger">コンタミ不可</span>' : ''} ${group.contamOk === undefined ? '<span class="badge badge-warn">コンタミ未確認</span>' : ''} </div> ${group.note ?`<div style="font-size:13px;margin-top:8px;padding:8px;background:white;border-radius:3px;">${escHtml(group.note)}</div>` : ''}
</div>

<div style="font-size:12px;color:var(--ink-mute);margin-bottom:8px;">タップで提供完了。変更指示は読み取り専用で表示されます</div>

<div class="dish-grid">
  ${course.map((item, i) => {
    const dishName = getItemName(item);
    const subs = getItemSubs(item);
    const served = group.served[i];
    const status = group.dishStatus[i] || 'normal';
    const changeNote = group.changeNotes[i];
    const statusClass = served ? 'status-served' :
                      status === 'change' ? 'status-change' :
                      status === 'warn' ? 'status-warn' : '';
    const statusLabel = status === 'change' ? '変更あり' :
                      status === 'warn' ? '要注意/なし' : '変更なし';

    const subHtml = subs.map((sub, si) => {
      const subKey = `${i}_${si}`;
      const subStatus = (group.subDishStatus && group.subDishStatus[subKey]) || 'normal';
      const subNote = (group.subChangeNotes && group.subChangeNotes[subKey]) || '';
      if (subStatus === 'normal' && !subNote) return '';
      const subLabel = subStatus === 'change' ? '変更あり' :
                     subStatus === 'warn' ? '要注意/なし' : '';
      const subBg = subStatus === 'change' ? '#fffbeb' :
                   subStatus === 'warn' ? 'var(--danger-bg)' : 'white';
      return `
        <div style="padding:6px 8px;background:${subBg};border-radius:3px;margin-top:4px;font-size:12px;">
          <div style="display:flex;align-items:center;gap:6px;">
            <span style="color:var(--ink-mute);font-size:11px;">└</span>
            <span style="flex:1;font-weight:500;">${escHtml(sub)}</span>
            ${subLabel ? `<span style="font-size:11px;color:${subStatus === 'warn' ? 'var(--danger)' : 'var(--warn)'};font-weight:600;">${subLabel}</span>` : ''}
          </div>
          ${subNote ? `<div style="margin-top:3px;padding:3px 6px;background:white;border-left:2px solid var(--accent);color:var(--accent);font-size:11px;">${escHtml(subNote)}</div>` : ''}
        </div>
      `;
    }).join('');

    return `
      <div class="dish-row ${statusClass}" data-dish-idx="${i}" style="flex-direction:column;align-items:stretch;">
        <div style="display:flex;align-items:center;gap:12px;width:100%;">
          <div class="dish-num">${String(i+1).padStart(2,'0')}</div>
          <div class="dish-info">
            <div class="dish-name">${escHtml(dishName)}</div>
            <div class="dish-note">${statusLabel}</div>
            ${changeNote ? `<div class="dish-change-note">${escHtml(changeNote)}</div>` : ''}
          </div>
          <div class="dish-check">${served ? '✓' : ''}</div>
        </div>
        ${subHtml ? `<div style="padding-left:44px;padding-top:6px;">${subHtml}</div>` : ''}
      </div>
    `;
  }).join('')}
</div>

<div style="margin-top:14px;display:flex;gap:6px;">
  <button type="button" class="btn btn-outline btn-block btn-sm" id="btn-mark-all">全て提供済みにする</button>
  <button type="button" class="btn btn-outline btn-block btn-sm" id="btn-reset-served">提供チェックをリセット</button>
</div>

`;

document.querySelectorAll('[data-dish-idx]').forEach(el => {
el.addEventListener('click', () => {
const idx = parseInt(el.dataset.dishIdx);
group.served[idx] = !group.served[idx];
saveData(); openGroupServe(groupIdx);
});
});

document.getElementById('btn-mark-all').addEventListener('click', () => {
group.served = course.map(() => true);
saveData(); openGroupServe(groupIdx);
});

document.getElementById('btn-reset-served').addEventListener('click', () => {
showConfirm('リセット確認', '提供チェックをすべてリセットしますか？', ok => {
if (ok) {
group.served = course.map(() => false);
saveData(); openGroupServe(groupIdx);
}
});
});

showModal();
}

function openPrintPreview() {

if (!tour) return;

const company = getCompany(tour.companyId);
const course = getTourCourseItems(tour);

document.getElementById('modalTitle').textContent = '指示書プレビュー';
const printHtml = generatePrintHtml(tour, company, course);

document.getElementById('modalBody').innerHTML = `<div class="print-controls"> <button type="button" class="btn btn-accent" id="btn-do-print" style="flex:1;">印刷する</button> <button type="button" class="btn btn-outline" id="btn-close-print">閉じる</button> </div> <div style="font-size:11px;color:var(--ink-mute);margin-bottom:8px;line-height:1.5;"> A4縦推奨。PDFとして保存もできます。 </div> ${printHtml}`;
// 印刷用エリアにはpreviewクラスを外したHTMLを入れる

function doPrint(htmlContent) {
// 別ページを開いて印刷する方式（iPad Safari対策）
// htmlContentが渡されていなければ、現在のprintAreaの内容を使う
const content = typeof htmlContent === 'string'
? htmlContent
: document.getElementById('printArea').innerHTML;

// 印刷用の完全なHTMLを組み立てる
const printDoc = `<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>印刷</title>
<style>

  * { box-sizing: border-box; }
  html, body {

    background: white; color: black;
    font-family: "Hiragino Mincho ProN", "Yu Mincho", "YuMincho", serif;

  }

  .doc-meta { font-size: 9pt; text-align: right; line-height: 1.5; }
  .info-row { display: flex; gap: 10px; margin-bottom: 6px; font-size: 10pt; flex-wrap: wrap; }
  .info-row > div { flex: 1; min-width: 130px; }
  .info-row .label { font-weight: 600; margin-right: 4px; color: #333; }
  table {
    width: 100%; border-collapse: collapse; margin-bottom: 10px;
    font-size: 9pt; table-layout: fixed;
  }
  th, td {
    border: 1px solid #333; padding: 3px 5px;

    word-wrap: break-word; overflow-wrap: break-word;

  .doc-footer {

  }
  .back-btn {
    display: inline-block;
    margin-bottom: 12px;
    padding: 7px 18px;
    background: white;
    color: #333;
    border: 1px solid #999;
    border-radius: 4px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
  }
  .back-btn:hover { background: #f5f5f5; }
  @media print {
    table { page-break-inside: auto; }
    tr { page-break-inside: avoid; page-break-after: auto; }
    thead { display: table-header-group; }
    .back-btn { display: none !important; }
  }
</style>
</head>
<body>
<button class="back-btn" onclick="window.close()">← 元のページに戻る</button>
${content}
<script>
  // 自動で印刷ダイアログを開く
  window.onbeforeprint = function() {
    var btn = document.querySelector('.back-btn');
    if (btn) btn.style.display = 'none';

  window.onafterprint = function() {
    var btn = document.querySelector('.back-btn');

// 新しいウィンドウを開く

function generatePrintHtml(tour, company, course) {
const groups = tour.groups || [];
const today = new Date();
const printedAt = `${today.getFullYear()}/${String(today.getMonth()+1).padStart(2,'0')}/${String(today.getDate()).padStart(2,'0')}`;
const allergyTotal = totalGroupCount(tour);
const generalTotal = generalGuestCount(tour);

const customerTable = `<div class="table-title">① お客様情報</div> <table> <thead> <tr> <th style="width:14%;">区分</th> <th style="width:10%;">人数</th> <th style="width:32%;">制限内容（アレルギー）</th> <th style="width:14%;">コンタミ</th> <th style="width:30%;">備考</th> </tr> </thead> <tbody> ${groups.length === 0 ?`
<tr><td colspan="5" style="text-align:center;color:#999;">アレルギー対応必要なお客様なし</td></tr>
`: groups.map((g, i) =>`
<tr>
<td style="text-align:center;">${escHtml(g.label) || `G${i+1}`}</td>
<td style="text-align:center;">${g.count}名</td>
<td>${escHtml((g.allergies || []).join('・')) || '—'}</td>
<td style="text-align:center;">
${g.contamOk === true ? '可' : g.contamOk === false ? '不可' : '未確認'}
</td>
<td>${escHtml(g.note) || ''}</td>
</tr>
`).join('')} ${generalTotal > 0 ? `
<tr>
<td style="text-align:center;">一般</td>
<td style="text-align:center;">${generalTotal}名</td>
<td colspan="3" style="color:#666;">アレルギー対応なし</td>
</tr>
`: ''} <tr style="background:#f8f8f8;"> <td colspan="2" style="text-align:right;font-weight:600;">全体合計</td> <td colspan="3">${tour.totalGuests || 0}名（うちアレルギー対応 ${allergyTotal}名）</td> </tr> </tbody> </table>`;

let changeTable = '';
if (groups.length > 0 && course.length > 0) {
// 列幅の計算: No列5%, 品目列22%, 残り73%をグループ数で割る
const groupColWidth = Math.floor(73 / groups.length);
changeTable = `<div class="table-title">② 変更対応表（調理指示書）</div> <table> <thead> <tr> <th style="width:5%;">No.</th> <th style="width:22%;">品目</th> ${groups.map((g, i) =>`<th style="width:${groupColWidth}%;">${escHtml(g.label) || `G${i+1}`}<br><span style="font-weight:400;font-size:8pt;">${g.count}名・${escHtml((g.allergies||[]).join('/'))}</span></th>`).join('')} </tr> </thead> <tbody> ${course.map((item, di) => { const dishName = getItemName(item); const subs = getItemSubs(item); const mainRow = `
<tr>
<td style="text-align:center;font-size:8pt;color:#666;">${String(di+1).padStart(2,'0')}</td>
<td style="font-weight:500;">${escHtml(dishName)}</td>
${groups.map(g => {
const status = (g.dishStatus && g.dishStatus[di]) || 'normal';
const cellClass = status === 'change' ? 'cell-change' :
status === 'warn' ? 'cell-warn' : 'cell-normal';
const label = status === 'change' ? '変更' :
status === 'warn' ? '×' : '○';
const note = (g.changeNotes && g.changeNotes[di]) || '';
return `<td class="${cellClass}" style="text-align:${note ? 'left' : 'center'};"> <div style="font-weight:600;${note ? '' : 'text-align:center;'}">${label}</div> ${note ? `<div class="change-note">${escHtml(note)}</div>` : ''} </td>`;
}).join('')}
</tr>
`; const subRows = subs.map((sub, si) => {
const subKey = `${di}_${si}`;
return `
<tr>
<td></td>
<td style="padding-left:14px;font-size:10px;color:#555;">└ ${escHtml(sub)}</td>
${groups.map(g => {
const subStatus = (g.subDishStatus && g.subDishStatus[subKey]) || 'normal';
const subNote = (g.subChangeNotes && g.subChangeNotes[subKey]) || '';
const cellClass = subStatus === 'change' ? 'cell-change' :
subStatus === 'warn' ? 'cell-warn' : 'cell-normal';
const label = subStatus === 'change' ? '変更' :
subStatus === 'warn' ? '×' :
subNote ? '○' : '';
return `<td class="${cellClass}" style="text-align:${subNote ? 'left' : 'center'};font-size:10px;"> ${label ? `<div style="font-weight:500;${subNote ? '' : 'text-align:center;'}">${label}</div>`: ''} ${subNote ?`<div class="change-note">${escHtml(subNote)}</div>` : ''} </td>`;
}).join('')}
</tr>
`;
}).join('');
return mainRow + subRows;
}).join('')} </tbody> </table> <div style="font-size:9.5px;color:#555;margin-top:3px;"> 凡例：○ = 変更なし、<span style="background:#fffacd;padding:0 6px;">変更</span> = 変更あり、<span style="background:#ffd6d6;padding:0 6px;">×</span> = 要注意 / 提供なし </div> `;

groups.forEach((g, i) => {

notesItems.push(`<strong>${escHtml(g.label) || `G${i+1}`}</strong>：${escHtml(g.note)}`);

const notesSection = notesItems.length > 0 ? `<div class="notes"> <div style="font-weight:600;margin-bottom:3px;">特記事項</div> <ul>${notesItems.map(n =>`<li>${n}</li>`).join('')}</ul> </div> ` : '';

return `

作成日：${printedAt}
</div>
</div>

  <div class="info-row">
    <div><span class="label">旅行会社：</span>${escHtml(company.name)}</div>
    <div><span class="label">来店日：</span>${formatDate(tour.date)}（${dayOfWeek(tour.date)}）</div>
    <div><span class="label">時間：</span>${escHtml(tour.time) || '—'}</div>
  </div>
  <div class="info-row">
    <div style="flex:2;"><span class="label">ツアー名：</span>${escHtml(tour.name) || '—'}</div>
    <div><span class="label">人数：</span>全${tour.totalGuests || 0}名</div>
    <div><span class="label">コース：</span>${escHtml(getTourCourseName(tour))}</div>
  </div>

  ${customerTable}
  ${changeTable}
  ${notesSection}

  <div class="doc-footer">
    <div>市場小路 アレルギー管理システム</div>
    <div>Page 1</div>
  </div>
</div>

`;
}

// ==================== 印刷：ツアーリスト ====================

let customEnd = todayStr();

const previewHtml = generateTourListHtml(tours, rangeType, customStart, customEnd);

      <div class="field-row" style="margin-top:8px;">
        <div class="field">

  <div class="print-controls" style="position:static;margin:0 0 12px;padding:0;border:none;">

    <button type="button" class="btn btn-outline" id="btn-close-print">閉じる</button>
  </div>

  ${tours.length === 0 ?

function getToursByRange(rangeType, customStart, customEnd) {
const today = new Date();
let start, end;

if (rangeType === 'today') {
const t = todayStr();
start = t; end = t;
} else if (rangeType === 'week') {
const day = today.getDay();
const monday = new Date(today);
monday.setDate(today.getDate() - ((day + 6) % 7));
const sunday = new Date(monday);
sunday.setDate(monday.getDate() + 6);
start = formatDateForInput(monday);
end = formatDateForInput(sunday);
} else if (rangeType === 'month') {
const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
const lastDay = new Date(today.getFullYear(), today.getMonth() + 1, 0);
start = formatDateForInput(firstDay);
end = formatDateForInput(lastDay);
} else {
start = customStart;
end = customEnd;
}

let tours = state.tours
.filter(t => t.date >= start && t.date <= end)
.sort((a, b) => a.date.localeCompare(b.date) || (a.time || '').localeCompare(b.time || ''));

if (currentCompanyFilter !== 'all') {
tours = tours.filter(t => t.companyId === currentCompanyFilter);
}

return tours;
}

function formatDateForInput(d) {
return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function generateTourListHtml(tours, rangeType, customStart, customEnd) {

const printedAt = `${today.getFullYear()}/${String(today.getMonth()+1).padStart(2,'0')}/${String(today.getDate()).padStart(2,'0')}`;

let rangeLabel = '';
if (rangeType === 'today') rangeLabel = formatDate(todayStr());
else if (rangeType === 'week') {
const day = today.getDay();
const monday = new Date(today);
monday.setDate(today.getDate() - ((day + 6) % 7));
const sunday = new Date(monday);
sunday.setDate(monday.getDate() + 6);
rangeLabel = `${formatDate(formatDateForInput(monday))} 〜 ${formatDate(formatDateForInput(sunday))}（今週）`;
} else if (rangeType === 'month') {
rangeLabel = `${today.getFullYear()}年${today.getMonth()+1}月`;
} else {
rangeLabel = `${formatDate(customStart)} 〜 ${formatDate(customEnd)}`;
}

// 集計
const totalTours = tours.length;
const totalGuests = tours.reduce((s, t) => s + (t.totalGuests || 0), 0);
const totalAllergy = tours.reduce((s, t) => s + totalGroupCount(t), 0);

const byDate = {};
tours.forEach(t => {

const tableRows = Object.keys(byDate).sort().map(date => {
const dateRows = byDate[date].map((t, idx) => {
const company = getCompany(t.companyId);
const allergyTotal = totalGroupCount(t);
const courseName = getTourCourseName(t);
const groupSummary = (t.groups || []).map(g =>
`${escHtml(g.label) || ''}${g.count}名(${escHtml((g.allergies || []).join('・')) || '—'})`
).join('<br>');

  return `<tr>
    ${idx === 0 ? `<td rowspan="${byDate[date].length}" style="text-align:center;vertical-align:middle;background:#fafafa;">
      ${formatDate(date)}<br>（${dayOfWeek(date)}）
    </td>` : ''}
    <td style="text-align:center;">${escHtml(t.time) || '—'}</td>
    <td style="text-align:center;">${escHtml(company.name)}</td>
    <td>
      <div>${escHtml(t.name) || '—'}</div>
      <div style="font-size:8.5pt;color:#666;margin-top:2px;">コース：${escHtml(courseName)}</div>
    </td>
    <td style="text-align:center;">${t.totalGuests || 0}名</td>
    <td style="text-align:center;${allergyTotal > 0 ? 'color:#8b2820;font-weight:600;' : ''}">${allergyTotal > 0 ? `${allergyTotal}名` : '—'}</td>
    <td style="font-size:8.5pt;">${groupSummary || '—'}</td>
  </tr>`;
}).join('');
return dateRows;

}).join('');

return `

// ==================== バックアップ関連 ====================
function exportData() {
const data = JSON.stringify(state, null, 2);
const blob = new Blob([data], { type: 'application/json' });
const url = URL.createObjectURL(blob);
const a = document.createElement('a');
a.href = url;
a.download = `allergy_data_${todayStr()}.json`;
a.click();
URL.revokeObjectURL(url);
state.lastBackupAt = new Date().toISOString();
saveData();
if (currentTab === 'settings') render();
}

function getDaysSinceBackup() {
if (!state.lastBackupAt) return null;
const last = new Date(state.lastBackupAt);
const now = new Date();
return Math.floor((now - last) / (1000 * 60 * 60 * 24));
}

function formatBackupStatus() {
if (!state.lastBackupAt) return 'まだバックアップしていません';
const last = new Date(state.lastBackupAt);
const days = getDaysSinceBackup();
const dateStr = `${last.getFullYear()}年${last.getMonth()+1}月${last.getDate()}日`;
const timeStr = `${String(last.getHours()).padStart(2,'0')}:${String(last.getMinutes()).padStart(2,'0')}`;
let suffix = '';
if (days === 0) suffix = '（今日）';
else if (days === 1) suffix = '（昨日）';
else if (days < 7) suffix = `（${days}日前）`;
else if (days < 30) suffix = `（${days}日前）`;
else suffix = `（${days}日前 ※要バックアップ）`;
return `${dateStr} ${timeStr} ${suffix}`;
}

function getBackupStatusBg() {
const days = getDaysSinceBackup();
if (days === null) return 'var(--warn-bg)';
if (days >= 30) return 'var(--danger-bg)';
if (days >= 14) return 'var(--warn-bg)';
return 'var(--ok-bg)';
}

function getBackupStatusBorder() {
const days = getDaysSinceBackup();
if (days === null) return '#fde68a';
if (days >= 30) return '#fecaca';
if (days >= 14) return '#fde68a';
return '#86efac';
}

function getBackupStatusColor() {
const days = getDaysSinceBackup();
if (days === null) return 'var(--warn)';
if (days >= 30) return 'var(--danger)';
if (days >= 14) return 'var(--warn)';
return 'var(--ok)';
}

function importData() {
const input = document.createElement('input');
input.type = 'file';
input.accept = 'application/json';
input.onchange = e => {
const file = e.target.files[0];
if (!file) return;
const reader = new FileReader();
reader.onload = () => {
try {
const imported = JSON.parse(reader.result);
showConfirm('取り込み確認', '現在のデータを上書きします。よろしいですか？', ok => {
if (ok) {
state = imported;
// 旧形式の補完
if (!state.companies) state.companies = [...DEFAULT_COMPANIES];
if (!state.customAllergens) state.customAllergens = [];
if (!state.tours) state.tours = [];
if (!state.courses) {
const oldDefault = state.defaultCourse || DEFAULT_COURSE_ITEMS;
state.courses = [{ id: uid(), name: '市場小路美食コース', items: [...oldDefault] }];
delete state.defaultCourse;
}
state.tours.forEach(t => {
if (t.courseItems && !t.courseId) {
const matching = state.courses.find(c =>
JSON.stringify(c.items) === JSON.stringify(t.courseItems));
if (matching) t.courseId = matching.id;
else t.customCourseItems = t.courseItems;
delete t.courseItems;
}
if (!t.courseId && !t.customCourseItems) t.courseId = state.courses[0]?.id;
if (!t.groups) t.groups = [];
if (typeof t.totalGuests !== 'number') t.totalGuests = 0;
t.groups.forEach(g => { if (!g.changeNotes) g.changeNotes = []; });
});
saveData(); render();
showAlert('読み込みました');
}
});
} catch (err) { showAlert('ファイルの読み込みに失敗しました'); }
};
reader.readAsText(file);
};
input.click();
}

function clearOld() {
const cutoff = new Date();
cutoff.setDate(cutoff.getDate() - 30);
const cutoffStr = formatDateForInput(cutoff);
const before = state.tours.length;
state.tours = state.tours.filter(t => t.date >= cutoffStr);
const removed = before - state.tours.length;
saveData(); render();
showAlert(`${removed}件のツアーを削除しました`);
}
